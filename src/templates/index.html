<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mordomo | Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.3);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at top right, var(--primary-glow), transparent 400px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            color: var(--primary-color);
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .grid-residents {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .resident-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .tag-admin {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .resident-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            min-height: 3rem;
        }

        .card-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
            display: flex;
            gap: 1rem;
        }

        .identity-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .identity-badge svg {
            width: 14px;
            height: 14px;
            opacity: 0.6;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">MORDOMO<span>.PEOPLE</span></div>
            <a href="/add" class="btn-add">+ Novo Residente</a>
        </header>

        {% if residents %}
            <div class="grid-residents">
                {% for r in residents %}
                    <div class="card">
                        <div class="card-header">
                            <div class="resident-name">{{ r.name }}</div>
                            {% if r.is_owner %}
                                <div class="tag-admin">Admin</div>
                            {% endif %}
                        </div>
                        <p class="resident-desc">{{ r.description or "Nenhuma descrição definida." }}</p>
                        <div class="card-footer">
                            <div class="identity-badge">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                Voice Ready
                            </div>
                            <div class="identity-badge">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                                WhatsApp
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="empty_state">
                <p>Nenhum residente cadastrado no sistema.</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
