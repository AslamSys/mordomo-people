<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar | Mordomo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.3);
            --text-main: #f8fafc;
            --input-bg: rgba(15, 23, 42, 0.8);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .form-container {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 { font-size: 1.5rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.5rem; }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; color: #94a3b8; }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.6rem;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary-color); }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.2s;
        }

        .btn-submit:hover { transform: translateY(-2px); opacity: 0.9; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Novo Residente</h1>
        <form action="/add" method="POST">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="name" placeholder="Ex: Renan Silva" required>
            </div>
            
            <div class="form-group">
                <label>Descrição / Papel</label>
                <textarea name="description" rows="3" placeholder="Ex: Dono da casa, programador e fã de automação."></textarea>
            </div>

            <div class="form-group">
                <label>WhatsApp (ID de Canal)</label>
                <input type="text" name="whatsapp" placeholder="whatsapp:+5511999999999">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="is_owner" id="is_owner">
                <label for="is_owner">Administrador do Sistema</label>
            </div>

            <button type="submit" class="btn-submit">Salvar Residente</button>
            <a href="/" class="back-link">← Voltar para a lista</a>
        </form>
    </div>
</body>
</html>
