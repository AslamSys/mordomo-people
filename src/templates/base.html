<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aslam Ecosystem | HQ{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --primary-light: #c084fc;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --glass: blur(12px) saturate(180%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding-top: 80px; /* Offset for fixed nav */
        }

        h1, h2, h3, .logo { font-family: 'Outfit', sans-serif; }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            z-index: -1; pointer-events: none;
        }

        /* Nav Bar - Absolute Stability */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 80px;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 10000;
            display: flex;
            align-items: center;
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-decoration: none;
            color: white;
        }
        .logo span { color: var(--primary-light); }

        .glass-card {
            background: var(--surface);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .btn {
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary-glow); }
        .btn-outline { border: 1px solid var(--border); color: var(--text-dim); }
        .btn-outline:hover { color: white; border-color: white; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }

        .input-field {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
            font-family: inherit;
        }
        .input-label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">ASLAM<span>.HQ</span></a>
            <div class="nav-links">
                {% if user %}
                    <span style="font-size: 0.8rem; color: var(--text-dim); margin-right: 20px;">Master: <b>{{ user.name }}</b></span>
                    <a href="/logout" class="btn btn-outline" style="padding: 6px 15px;">Encerrar</a>
                {% else %}
                    <a href="#setup" class="btn btn-primary">Ativar Sistema</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
